<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pebble Language Architecture</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0e1a;
    color: #e0e6f0;
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px;
    overflow-x: hidden;
  }

  h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #4fd9c4;
    margin-bottom: 8px;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.1s;
  }

  .subtitle {
    font-size: 12px;
    color: #4a5568;
    letter-spacing: 0.1em;
    margin-bottom: 52px;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.2s;
  }

  .chart {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 0;
    position: relative;
    max-width: 1300px;
    width: 100%;
  }

  /* Columns */
  .col {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }

  .col-gap { width: 52px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }

  /* Nodes */
  .node {
    border-radius: 6px;
    padding: 14px 16px;
    text-align: center;
    position: relative;
    cursor: default;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    opacity: 0;
    animation: fadeUp 0.5s ease forwards;
  }
  .node:hover { transform: translateY(-2px); }

  .node-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
  }

  .node-sub {
    font-size: 10px;
    line-height: 1.6;
    margin-top: 6px;
    opacity: 0.75;
    text-align: left;
    white-space: pre-line;
    font-family: 'IBM Plex Mono', monospace;
  }

  /* Node variants */
  .node-source {
    background: #131928;
    border: 1.5px solid #2d3a5c;
    color: #a8b8d8;
    width: 130px;
    box-shadow: 0 0 24px rgba(79,217,196,0.04);
  }
  .node-source .node-label { color: #c8d8f0; }

  .node-process {
    background: #111827;
    border: 1.5px solid #1e3a5f;
    color: #8ba8d0;
    width: 155px;
    box-shadow: 0 0 20px rgba(30,90,180,0.08);
  }
  .node-process .node-label { color: #60a5fa; }

  .node-ast {
    background: #0f1f18;
    border: 1.5px solid #1a4a30;
    color: #6abd9a;
    width: 140px;
    box-shadow: 0 0 20px rgba(74,200,130,0.08);
  }
  .node-ast .node-label { color: #4fd9a0; }

  .node-path {
    background: #1a1226;
    border: 1.5px solid #3a2060;
    color: #b090e0;
    width: 140px;
    box-shadow: 0 0 20px rgba(140,80,220,0.08);
  }
  .node-path .node-label { color: #c084fc; }

  .node-vm {
    background: #1a1810;
    border: 1.5px solid #4a3a10;
    color: #c0a060;
    width: 145px;
    box-shadow: 0 0 20px rgba(200,160,40,0.08);
  }
  .node-vm .node-label { color: #fbbf24; }

  .node-runtime {
    background: #120f1f;
    border: 2px solid #4fd9c4;
    color: #8ecfc8;
    width: 155px;
    box-shadow: 0 0 32px rgba(79,217,196,0.15);
  }
  .node-runtime .node-label { color: #4fd9c4; }

  .node-output {
    background: #0e1812;
    border: 1.5px solid #1a4020;
    color: #70b080;
    width: 150px;
    box-shadow: 0 0 20px rgba(60,180,80,0.06);
  }
  .node-output .node-label { color: #6ee7a0; }

  /* Tags on nodes */
  .tag {
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 0.15em;
    padding: 2px 7px;
    border-radius: 3px;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .tag-blue { background: #1e3a6e; color: #60a5fa; border: 1px solid #2563eb44; }
  .tag-green { background: #1a4a2a; color: #4fd9a0; border: 1px solid #22c55e44; }
  .tag-purple { background: #2d1a4a; color: #c084fc; border: 1px solid #9333ea44; }
  .tag-yellow { background: #3a2a0a; color: #fbbf24; border: 1px solid #f59e0b44; }
  .tag-teal { background: #0a2a28; color: #4fd9c4; border: 1px solid #0d9488aa; }
  .tag-red { background: #2a0f0f; color: #f87171; border: 1px solid #dc262644; }

  /* Arrows */
  .arrow {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    color: #2a3a5a;
  }

  svg.arr { overflow: visible; }

  /* Fork layout */
  .fork-block {
    display: flex;
    flex-direction: column;
    gap: 28px;
    align-items: flex-start;
  }

  .fork-row {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 0;
  }

  /* Vertical connector lines */
  .vconnect {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 2px;
    background: linear-gradient(to bottom, #1e3a5f, #2d2050);
    opacity: 0.7;
  }

  /* Merge lines */
  .merge-zone {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  /* Badges */
  .badge {
    display: inline-block;
    background: #0a2a28;
    border: 1px solid #0d948844;
    color: #4fd9c4;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    padding: 3px 8px;
    border-radius: 3px;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Section labels */
  .section-line {
    position: absolute;
    top: 0; bottom: 0;
    width: 1px;
    background: linear-gradient(to bottom, transparent, #1e3060 30%, #1e3060 70%, transparent);
    opacity: 0.5;
  }

  /* Legend */
  .legend {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 48px;
    padding: 16px 24px;
    border: 1px solid #1a2a40;
    border-radius: 8px;
    background: #0c1118;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 1.2s;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: #4a6080;
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 2px;
    border: 1.5px solid;
  }

  /* Responsive SVG arrows */
  .arr-line { stroke-width: 1.5; fill: none; stroke-dasharray: none; }
  .arr-head { fill: currentColor; }

  /* Animate nodes with stagger */
  .n1 { animation-delay: 0.15s; }
  .n2 { animation-delay: 0.25s; }
  .n3 { animation-delay: 0.35s; }
  .n4 { animation-delay: 0.45s; }
  .n5 { animation-delay: 0.55s; }
  .n6 { animation-delay: 0.65s; }
  .n7 { animation-delay: 0.75s; }
  .n8 { animation-delay: 0.80s; }
  .n9 { animation-delay: 0.85s; }
  .n10 { animation-delay: 0.9s; }
  .n11 { animation-delay: 0.95s; }

  .divider { width: 1px; height: 60px; background: linear-gradient(to bottom, #1e3060, #2d1a50); margin: 0 auto; }
</style>
</head>
<body>

<h1>Pebble Language — Compiler Architecture</h1>
<div class="subtitle">Source → Parse → AST → [Interpreter | Bytecode VM] → Runtime</div>

<div style="width:100%; max-width:1260px; overflow-x:auto;">
<svg viewBox="0 0 1220 520" xmlns="http://www.w3.org/2000/svg" style="width:100%;min-width:900px;display:block;margin:0 auto;">
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3a5a8a"/>
    </marker>
    <marker id="ah2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4a3a7a"/>
    </marker>
    <marker id="ah3" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0d9488"/>

  </defs>

  <!-- Background grid subtle -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#111827" stroke-width="0.5"/>
  </pattern>
  <rect width="1220" height="520" fill="url(#grid)" opacity="0.5"/>

  <!-- ── STAGE LABELS ── -->
  <text x="78" y="18" font-family="IBM Plex Mono" font-size="9" fill="#1e3a5f" letter-spacing="2" text-anchor="middle">SOURCE</text>
  <text x="200" y="18" font-family="IBM Plex Mono" font-size="9" fill="#1e3a5f" letter-spacing="2" text-anchor="middle">PARSE</text>
  <text x="370" y="18" font-family="IBM Plex Mono" font-size="9" fill="#1e3a5f" letter-spacing="2" text-anchor="middle">PREPROCESS</text>
  <text x="556" y="18" font-family="IBM Plex Mono" font-size="9" fill="#1e3a5f" letter-spacing="2" text-anchor="middle">STMT PARSE</text>
  <text x="722" y="18" font-family="IBM Plex Mono" font-size="9" fill="#1e3a5f" letter-spacing="2" text-anchor="middle">EXPR PARSE</text>
  <text x="880" y="18" font-family="IBM Plex Mono" font-size="9" fill="#1e3a5f" letter-spacing="2" text-anchor="middle">AST</text>
  <text x="1040" y="18" font-family="IBM Plex Mono" font-size="9" fill="#1e3a5f" letter-spacing="2" text-anchor="middle">EXECUTION</text>

  <!-- Stage dividers -->
  <line x1="130" y1="30" x2="130" y2="490" stroke="#111827" stroke-width="1"/>
  <line x1="258" y1="30" x2="258" y2="490" stroke="#111827" stroke-width="1"/>
  <line x1="460" y1="30" x2="460" y2="490" stroke="#111827" stroke-width="1"/>
  <line x1="640" y1="30" x2="640" y2="490" stroke="#111827" stroke-width="1"/>
  <line x1="800" y1="30" x2="800" y2="490" stroke="#111827" stroke-width="1"/>
  <line x1="960" y1="30" x2="960" y2="490" stroke="#111827" stroke-width="1"/>

  <!-- ══════════════════════════════════════════════════
       NODE A – Source file
  ══════════════════════════════════════════════════ -->
  <!-- A -->
  <rect x="10" y="195" width="120" height="52" rx="6" fill="#131928" stroke="#2d3a5c" stroke-width="1.5"/>
  <text x="70" y="216" font-family="IBM Plex Mono" font-size="11" font-weight="600" fill="#c8d8f0" text-anchor="middle">Source File</text>
  <text x="70" y="232" font-family="IBM Plex Mono" font-size="10" fill="#4a6080" text-anchor="middle">.peb</text>
  <text x="70" y="244" font-family="IBM Plex Mono" font-size="9" fill="#2a4060" text-anchor="middle">source code</text>
  <!-- tag -->
  <rect x="28" y="185" width="84" height="14" rx="3" fill="#131928" stroke="#1e3a5f44"/>

  <!-- A→B arrow -->
  <line x1="130" y1="221" x2="160" y2="221" stroke="#3a5a8a" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- ══════════════════════════════════════════════════
       NODE B – Parser
  ══════════════════════════════════════════════════ -->
  <rect x="160" y="195" width="100" height="52" rx="6" fill="#111827" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="210" y="224" font-family="IBM Plex Mono" font-size="12" font-weight="600" fill="#60a5fa" text-anchor="middle">Parser</text>
  <text x="210" y="240" font-family="IBM Plex Mono" font-size="9" fill="#2a4a70" text-anchor="middle">entry point</text>
  <rect x="166" y="185" width="88" height="14" rx="3" fill="#0a1428" stroke="#1e3a5f44"/>
  <text x="210" y="195" font-family="IBM Plex Mono" font-size="8" fill="#3a6090" text-anchor="middle" letter-spacing="1">PHASE 1</text>

  <!-- B→C arrow -->
  <line x1="260" y1="221" x2="290" y2="221" stroke="#3a5a8a" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- ══════════════════════════════════════════════════
       NODE C – Source Preprocessing
  ══════════════════════════════════════════════════ -->
  <rect x="290" y="150" width="170" height="105" rx="6" fill="#111827" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="375" y="172" font-family="IBM Plex Mono" font-size="11" font-weight="600" fill="#60a5fa" text-anchor="middle">Source Preprocessing</text>
  <line x1="300" y1="178" x2="450" y2="178" stroke="#1e3a5f" stroke-width="1"/>
  <text x="300" y="192" font-family="IBM Plex Mono" font-size="9" fill="#3a5a80">• strip comments</text>
  <text x="300" y="207" font-family="IBM Plex Mono" font-size="9" fill="#3a5a80">• normalize indentation</text>
  <text x="300" y="222" font-family="IBM Plex Mono" font-size="9" fill="#3a5a80">• merge bracketed</text>
  <text x="300" y="236" font-family="IBM Plex Mono" font-size="9" fill="#3a5a80">  multiline expressions</text>
  <rect x="308" y="140" width="134" height="14" rx="3" fill="#0a1428" stroke="#1e3a5f44"/>
  <text x="375" y="150" font-family="IBM Plex Mono" font-size="8" fill="#3a6090" text-anchor="middle" letter-spacing="1">PHASE 2</text>

  <!-- C→D arrow -->
  <line x1="460" y1="203" x2="490" y2="203" stroke="#3a5a8a" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- ══════════════════════════════════════════════════
       NODE D – Statement Parsing
  ══════════════════════════════════════════════════ -->
  <rect x="490" y="148" width="152" height="113" rx="6" fill="#111827" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="566" y="170" font-family="IBM Plex Mono" font-size="11" font-weight="600" fill="#60a5fa" text-anchor="middle">Statement Parsing</text>
  <line x1="500" y1="176" x2="632" y2="176" stroke="#1e3a5f" stroke-width="1"/>
  <text x="500" y="190" font-family="IBM Plex Mono" font-size="9" fill="#3a5a80">• if / while / for</text>
  <text x="500" y="205" font-family="IBM Plex Mono" font-size="9" fill="#3a5a80">• def / class / import</text>
  <text x="500" y="220" font-family="IBM Plex Mono" font-size="9" fill="#3a5a80">• assignment / print</text>
  <text x="500" y="235" font-family="IBM Plex Mono" font-size="9" fill="#3a5a80">• return / raise</text>
  <rect x="510" y="138" width="112" height="14" rx="3" fill="#0a1428" stroke="#1e3a5f44"/>
  <text x="566" y="148" font-family="IBM Plex Mono" font-size="8" fill="#3a6090" text-anchor="middle" letter-spacing="1">PHASE 3</text>

  <!-- D→E arrow -->
  <line x1="642" y1="205" x2="672" y2="205" stroke="#3a5a8a" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- ══════════════════════════════════════════════════
       NODE E – Expression Parsing
  ══════════════════════════════════════════════════ -->
  <rect x="672" y="166" width="133" height="74" rx="6" fill="#111827" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="739" y="188" font-family="IBM Plex Mono" font-size="11" font-weight="600" fill="#60a5fa" text-anchor="middle">Expr Parsing</text>
  <line x1="682" y1="194" x2="795" y2="194" stroke="#1e3a5f" stroke-width="1"/>
  <text x="682" y="208" font-family="IBM Plex Mono" font-size="9" fill="#3a5a80">via Python</text>
  <text x="682" y="222" font-family="IBM Plex Mono" font-size="9" fill="#4a6890">ast.parse(...)</text>
  <rect x="690" y="156" width="98" height="14" rx="3" fill="#0a1428" stroke="#1e3a5f44"/>
  <text x="739" y="166" font-family="IBM Plex Mono" font-size="8" fill="#3a6090" text-anchor="middle" letter-spacing="1">PHASE 4</text>

  <!-- E→F arrow -->
  <line x1="805" y1="203" x2="835" y2="203" stroke="#3a5a8a" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- ══════════════════════════════════════════════════
       NODE F – Pebble AST
  ══════════════════════════════════════════════════ -->
  <rect x="835" y="166" width="128" height="74" rx="6" fill="#0f1f18" stroke="#1a4a30" stroke-width="1.5"/>
  <!-- glow accent -->

  <text x="899" y="188" font-family="IBM Plex Mono" font-size="11" font-weight="600" fill="#4fd9a0" text-anchor="middle">Pebble AST</text>

  <text x="899" y="166" font-family="IBM Plex Mono" font-size="8" fill="#2a8a58" text-anchor="middle" letter-spacing="1">AST</text>

  <!-- F forks to G and H -->
  <!-- Fork line down from F center -->
  <line x1="963" y1="203" x2="985" y2="203" stroke="#3a5a8a" stroke-width="1.5"/>
  <!-- vertical split -->
  <line x1="985" y1="135" x2="985" y2="335" stroke="#2a3a5a" stroke-width="1.5"/>
  <!-- G branch -->
  <line x1="985" y1="155" x2="1010" y2="155" stroke="#4a3a7a" stroke-width="1.5" marker-end="url(#ah2)"/>

  <!-- ══════════════════════════════════════════════════

  ══════════════════════════════════════════════════ -->
  <rect x="1010" y="110" width="145" height="90" rx="6" fill="#1a1226" stroke="#3a2060" stroke-width="1.5"/>

  <text x="1020" y="181" font-family="IBM Plex Mono" font-size="8.5" fill="#3a2a5a">direct AST eval</text>
  <rect x="1028" y="100" width="110" height="14" rx="3" fill="#110e1a" stroke="#3a206044"/>
  <text x="1083" y="110" font-family="IBM Plex Mono" font-size="8" fill="#7a4ab0" text-anchor="middle" letter-spacing="1">PATH A</text>

  <!-- ══════════════════════════════════════════════════
       NODE H – Bytecode Compiler Path
  ══════════════════════════════════════════════════ -->
  <rect x="1010" y="255" width="145" height="52" rx="6" fill="#1a1226" stroke="#3a2060" stroke-width="1.5"/>
  <rect x="1010" y="255" width="145" height="3" rx="2" fill="#c084fc" opacity="0.35"/>

  <rect x="1028" y="245" width="110" height="14" rx="3" fill="#110e1a" stroke="#3a206044"/>
  <text x="1083" y="255" font-family="IBM Plex Mono" font-size="8" fill="#7a4ab0" text-anchor="middle" letter-spacing="1">PATH B</text>

  <!-- H→I (bytecode instructions node) -->
  <line x1="1155" y1="281" x2="1175" y2="281" stroke="#4a3a7a" stroke-width="1.5"/>
  <line x1="1175" y1="281" x2="1175" y2="330" stroke="#4a3a7a" stroke-width="1.5"/>
  <line x1="1175" y1="330" x2="1155" y2="330" stroke="#4a3a7a" stroke-width="1.5" marker-end="url(#ah2)"/>
  <!-- Bytecode instructions mini label -->
  <rect x="1160" y="270" width="90" height="20" rx="3" fill="#110e1a" stroke="#3a206033"/>
  <text x="1205" y="283" font-family="IBM Plex Mono" font-size="8" fill="#6a4a90" text-anchor="middle">bytecode instrs</text>
